<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たぬきーぬのプロフィール</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --border-color: #30363d;
            --header-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-blue: #58a6ff;
            --secondary-bg: #21262d;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
        }

        /* ぼかし背景：URLを指定 */
        .blurred-background {
            position: fixed; top: -10px; left: -10px; right: -10px; bottom: -10px; z-index: -1;
            /* ここにウェブ上の画像リンクを貼り付けます */
            background-image: url('https://cdn.roomclip.jp/photo/640/4856496a63c308082d72b820aa991b918aefd955.jpg'); 
            background-size: cover; 
            background-position: center;
            filter: blur(12px);
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: overlay;
        }

        .main-content {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }

        .container {
            width: 100%; max-width: 900px;
            background-color: rgba(13, 17, 23, 0.95);
            border: 1px solid var(--border-color); border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ヘッダー */
        .file-header {
            background-color: var(--header-bg);
            padding: 12px 16px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }

        .file-info { display: flex; align-items: center; color: var(--text-color); font-size: 14px; }
        .file-name { font-weight: 600; color: var(--accent-blue); margin-left: 8px; }

        /* オーディオセクション（非表示） */
        .audio-section {
            display: none;
        }

        /* テキスト表示部分 */
        #file-display {
            padding: 20px; margin: 0;
            color: var(--text-color);
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; overflow-y: auto;
            max-height: 70vh;
        }

        .loading { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <div class="blurred-background"></div>

    <div class="main-content">
        <div class="container">
            <div class="file-header">
                <div class="file-info">
                    <svg height="16" viewBox="0 0 16 16" width="16" fill="#8b949e"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm7-3.25v2.992l1.232.711a.75.75 0 0 1-.75 1.301l-1.607-.927A.75.75 0 0 1 7 8.18V4.75a.75.75 0 0 1 1.5 0Z"></path></svg>
                    <span class="file-name" id="file-name-label">loading...</span>
                </div>
            </div>

            <audio id="audio-player" autoplay loop>
                <source src="audio.mp3" type="audio/mpeg">
            </audio>

            <pre id="file-display" class="loading">テキストを読み込み中...</pre>
        </div>
    </div>

<script>
    const targetFile = 'content.txt'; 

    async function initialize() {
        const displayElement = document.getElementById('file-display');
        const labelElement = document.getElementById('file-name-label');
        const audio = document.getElementById('audio-player');
        
        labelElement.textContent = targetFile;

        // クリックで再生開始（ブラウザ制限対策）
        const startAudio = () => {
            audio.play().catch(e => console.log("Playback blocked:", e));
            window.removeEventListener('click', startAudio);
            window.removeEventListener('touchstart', startAudio);
        };
        window.addEventListener('click', startAudio);
        window.addEventListener('touchstart', startAudio);

        if (window.location.protocol === 'file:') {
            displayElement.innerHTML = `<span style="color:#ff7b72">Error: ローカル環境ではファイルを読み込めません。<br>Live Server等を使用してください。</span>`;
            return;
        }

        try {
            const response = await fetch(targetFile);
            if (!response.ok) throw new Error('File not found');
            const text = await response.text();
            displayElement.textContent = text;
            displayElement.classList.remove('loading');
        } catch (error) {
            displayElement.textContent = "テキストファイルの読み込みに失敗しました。";
        }
    }

    initialize();
</script>

</body>
</html>
