<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たぬきーぬのプロフィール</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* 背景色 #C8C8BE */
        body {
            background-color: #C8C8BE;
            margin: 0;
            display: flex;
            justify-content: flex-start; /* 左側に目次を置くため */
            align-items: flex-start;
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            scroll-behavior: smooth; /* スムーズにジャンプさせる */
        }

        /* --- 目次（左側固定） --- */
        #nav-sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 20px;
            background-color: rgba(255, 255, 255, 0.3); /* ダイアログより薄い透過 */
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        #nav-sidebar::-webkit-scrollbar {
            width: 5px;
        }
        #nav-sidebar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .nav-item {
            display: block;
            padding: 12px 15px;
            margin-bottom: 8px;
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.6);
            transform: translateX(5px);
        }

        /* --- メインコンテンツ --- */
        #main-wrapper {
            margin-left: 250px; /* 目次の幅 */
            flex-grow: 1;
            display: flex;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        #content-box {
            width: 100%;
            max-width: 750px;
            padding: 60px;
            background-color: rgba(255, 255, 255, 0.6); /* 透過度60% */
            border-radius: 40px; /* 丸ぶち */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }

        /* タイトルと段落のスタイル */
        .section-title {
            display: block;
            font-weight: bold;
            font-size: 1.8rem;
            margin: 50px 0 20px 0;
            color: #2c3e50;
            scroll-margin-top: 60px; /* ジャンプ時の余白 */
            border-left: 5px solid #2c3e50;
            padding-left: 15px;
            font-style: normal; /* 明示的に通常表示 */
        }

        .section-title:first-child { margin-top: 0; }

        .section-text {
            display: block;
            white-space: pre-wrap;
            line-height: 2;
            color: #444;
            margin-bottom: 40px;
            font-size: 1.05rem;
            text-align: justify;
            font-style: normal; /* 明示的に通常表示 */
        }

        /* リンクのスタイル */
        .section-text a {
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
        }

        .section-text a:hover {
            color: #0052a3;
        }

        /* 読み込み中表示 */
        .loading {
            text-align: center;
            color: #777;
            font-style: italic;
        }

        /* --- 来場者カウンター --- */
        #visitor-counter {
            margin-top: 30px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            text-align: center;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #visitor-counter.faded {
            opacity: 0.3;
        }

        .counter-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .counter-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            font-family: 'Courier New', monospace;
        }

        .counter-loading {
            font-size: 0.9rem;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

    <nav id="nav-sidebar">
        <div style="font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; color: #2c3e50; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px;">INDEX</div>
        <div id="nav-list"></div>
        
        <!-- 来場者カウンター -->
        <div id="visitor-counter">
            <div class="counter-label">来場者数</div>
            <div class="counter-number" id="counter-display">
                <span class="counter-loading">読み込み中...</span>
            </div>
        </div>
    </nav>

    <div id="main-wrapper">
        <div id="content-box">
            <div id="text-target" class="loading">最新のデータを取得中...</div>
        </div>
    </div>

    <script>
        const filePath = "./context.txt";

        // Firebase初期化（ユーザーが設定を追加する必要あり）
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase初期化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 来場者カウンター機能
        class VisitorCounter {
            constructor() {
                this.counterRef = database.ref('visitor_count');
                this.sessionKey = 'visitor_session';
                this.init();
            }

            async init() {
                // セッションチェック（同じセッションでの重複カウントを防ぐ）
                if (!sessionStorage.getItem(this.sessionKey)) {
                    await this.incrementCounter();
                    sessionStorage.setItem(this.sessionKey, 'true');
                }
                this.displayCounter();
                this.setupScrollListener();
            }

            async incrementCounter() {
                try {
                    await this.counterRef.transaction((currentCount) => {
                        return (currentCount || 0) + 1;
                    });
                } catch (error) {
                    console.error('カウンター更新エラー:', error);
                }
            }

            displayCounter() {
                const display = document.getElementById('counter-display');
                
                this.counterRef.on('value', (snapshot) => {
                    const count = snapshot.val() || 0;
                    display.innerHTML = count.toLocaleString();
                }, (error) => {
                    console.error('カウンター読み取りエラー:', error);
                    display.innerHTML = 'エラー';
                });
            }

            setupScrollListener() {
                const navSidebar = document.getElementById('nav-sidebar');
                const visitorCounter = document.getElementById('visitor-counter');
                const navList = document.getElementById('nav-list');
                
                const checkOverlap = () => {
                    const navRect = navList.getBoundingClientRect();
                    const counterRect = visitorCounter.getBoundingClientRect();
                    
                    // INDEXリストの下端とカウンターの上端が近づいたらフェード
                    const distance = counterRect.top - navRect.bottom;
                    
                    if (distance < 20) { // 20px以内に近づいたら
                        visitorCounter.classList.add('faded');
                    } else {
                        visitorCounter.classList.remove('faded');
                    }
                };

                // スクロールイベントとリサイズイベントを監視
                window.addEventListener('scroll', checkOverlap);
                window.addEventListener('resize', checkOverlap);
                
                // 初期チェック
                setTimeout(checkOverlap, 100);
            }
        }

        // URLを検出してリンク化する関数
        function linkifyText(text) {
            // URLパターン（http, https, ftp）
            const urlPattern = /(https?:\/\/[^\s]+|ftp:\/\/[^\s]+)/g;
            const parts = text.split(urlPattern);
            
            const container = document.createElement('span');
            parts.forEach(part => {
                if (part && (part.startsWith('http://') || part.startsWith('https://') || part.startsWith('ftp://'))) {
                    const a = document.createElement('a');
                    a.href = part;
                    a.textContent = part;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    container.appendChild(a);
                } else {
                    container.appendChild(document.createTextNode(part));
                }
            });
            
            return container.childNodes;
        }

        async function fetchAndBuild() {
            const container = document.getElementById('text-target');
            const navList = document.getElementById('nav-list');
            
            try {
                // キャッシュ対策: URLの末尾に現在の時間を付けて、常に「新しいリクエスト」として送る
                const cacheBuster = `?t=${new Date().getTime()}`;
                const response = await fetch(filePath + cacheBuster, {
                    cache: "no-store"
                });

                if (!response.ok) throw new Error('File not found');
                const rawText = await response.text();

                // 画面をリセット
                container.innerHTML = "";
                container.className = ""; // loadingクラスを削除
                navList.innerHTML = "";

                // 《 》で文章を分割
                const sections = rawText.split(/(《[^》]+》)/g);
                let sectionCount = 0;

                sections.forEach(part => {
                    if (part.startsWith('《') && part.endsWith('》')) {
                        sectionCount++;
                        const titleText = part.replace(/[《》]/g, '');
                        const sectionId = `section-${sectionCount}`;

                        // 1. 本文側の見出し（アンカー先）
                        const h = document.createElement('span');
                        h.className = 'section-title';
                        h.id = sectionId;
                        h.textContent = titleText;
                        container.appendChild(h);

                        // 2. 目次アイテム
                        const navItem = document.createElement('a');
                        navItem.className = 'nav-item';
                        navItem.textContent = titleText;
                        navItem.href = `#${sectionId}`;
                        navList.appendChild(navItem);

                    } else if (part.trim() !== "") {
                        // 本文
                        const p = document.createElement('span');
                        p.className = 'section-text';
                        
                        // テキストをリンク化
                        const nodes = linkifyText(part.trim());
                        nodes.forEach(node => {
                            p.appendChild(node.cloneNode(true));
                        });
                        
                        container.appendChild(p);
                    }
                });

            } catch (err) {
                container.innerHTML = `<div style="color:red;">データの取得に失敗しました。<br>リポジトリに context.txt が存在するか確認してください。</div>`;
                console.error(err);
            }
        }

        // 実行
        fetchAndBuild();
        
        // 来場者カウンターを初期化
        new VisitorCounter();
    </script>
</body>
</html>
