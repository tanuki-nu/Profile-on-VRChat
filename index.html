<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たぬきーぬのプロフィール</title>
    <style>
        /* 1. 背景を薄めのベージュに設定し、中央配置の準備 */
        body {
            background-color: #f5f5dc; /* ベージュ */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* 2. ダイアログボックスの設定 */
        #content-box {
            width: 80%;
            max-width: 600px;
            padding: 30px;
            
            /* 透過度60%の白背景 */
            background-color: rgba(255, 255, 255, 0.6);
            
            /* 丸ぶち（角丸） */
            border-radius: 20px;
            
            /* ぼかし効果を加えると透過がより綺麗に見えます */
            backdrop-filter: blur(5px);
            
            /* 軽い影をつけて浮遊感を出す */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            white-space: pre-wrap; /* 改行を維持 */
            color: #333;
            line-height: 1.6;
        }

        h2 {
            margin-top: 0;
            color: #5d5d5d;
        }
    </style>
</head>
<body>

    <div id="content-box">
        <h2>Content</h2>
        <div id="text-target">読み込み中...</div>
    </div>

    <script>
        // 設定をあなたの環境に合わせて変更してください
        const userName = "あなたのユーザー名";
        const repoName = "リポジトリ名";
        const branch = "main";
        const filePath = "context.txt";

        const url = `https://raw.githubusercontent.com/${userName}/${repoName}/${branch}/${filePath}`;

        async function loadGitHubText() {
            const displayElement = document.getElementById('text-target');
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('取得失敗');
                const text = await response.text();
                displayElement.textContent = text;
            } catch (error) {
                displayElement.textContent = "データの読み込みに失敗しました。";
            }
        }

        loadGitHubText();
    </script>
</body>
</html>
