<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Context Viewer</title>
    <style>
        /* 背景色 #C8C8BE */
        body {
            background-color: #C8C8BE;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* 透過度60%のダイアログ */
        #content-box {
            width: 85%;
            max-width: 500px;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 30px; /* 丸ぶち */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        #text-target {
            white-space: pre-wrap; /* 改行反映 */
            line-height: 1.8;
            color: #333;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="content-box">
        <div id="text-target">読み込み中...</div>
    </div>

    <script>
        // 同一リポジトリ内にある場合は、相対パスで指定可能
        // GitHub Pagesなどで公開すると、同じディレクトリのcontext.txtを取得します
        const filePath = "./context.txt";

        async function fetchLocalContent() {
            const display = document.getElementById('text-target');
            try {
                // 同じ場所にあるファイルをフェッチ
                const response = await fetch(filePath);
                
                if (!response.ok) {
                    throw new Error('File not found');
                }
                
                const text = await response.text();
                display.textContent = text;
            } catch (err) {
                // ローカル（自分のPC）で直接HTMLを開くとCORSエラーが出るため、
                // その場合はGitHub上のRaw URLを参照するようにフォールバックさせると便利です
                console.warn("相対パスでの取得に失敗しました。GitHub Pages上でのみ動作します。");
                display.textContent = "ファイルを読み込めませんでした。";
            }
        }

        fetchLocalContent();
    </script>
</body>
</html>
