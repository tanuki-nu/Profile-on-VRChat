<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たぬきーぬのプロフィール</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* 背景色 #C8C8BE */
        body {
            background-color: #C8C8BE;
            margin: 0;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            min-height: 100vh;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            scroll-behavior: smooth;
        }

        /* --- 目次（左側固定） --- */
        #nav-sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 20px;
            background-color: rgba(255, 255, 255, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-sizing: border-box;
        }
        #nav-sidebar::-webkit-scrollbar {
            width: 5px;
        }
        #nav-sidebar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .nav-item {
            display: block;
            padding: 12px 15px;
            margin-bottom: 8px;
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.6);
            transform: translateX(5px);
        }

        /* --- メインコンテンツ --- */
        #main-wrapper {
            margin-left: 250px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }
        #content-box {
            width: 100%;
            max-width: 750px;
            padding: 60px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }

        .section-title {
            display: block;
            font-weight: bold;
            font-size: 1.8rem;
            margin: 50px 0 20px 0;
            color: #2c3e50;
            scroll-margin-top: 60px;
            border-left: 5px solid #2c3e50;
            padding-left: 15px;
        }
        .section-title:first-child { margin-top: 0; }
        .section-text {
            display: block;
            white-space: pre-wrap;
            line-height: 2;
            color: #444;
            margin-bottom: 40px;
            font-size: 1.05rem;
            text-align: justify;
        }
        .section-text a {
            color: #0066cc;
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            color: #777;
            font-style: italic;
        }

        /* --- 来場者カウンター --- */
        #visitor-counter {
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            text-align: center;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #visitor-counter.faded { opacity: 0.3; }
        .counter-label { font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        .counter-number { font-size: 1.5rem; font-weight: bold; color: #2c3e50; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <nav id="nav-sidebar">
        <div style="font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; color: #2c3e50; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px;">INDEX</div>
        <div id="nav-list"></div>
        <div id="visitor-counter" style="position: absolute; bottom: 20px; left: 20px; right: 20px;">
            <div class="counter-label">来場者数</div>
            <div class="counter-number" id="counter-display">
                <span style="font-size: 0.9rem; color: #999;">読み込み中...</span>
            </div>
        </div>
    </nav>
    <div id="main-wrapper">
        <div id="content-box">
            <div id="text-target" class="loading">最新のデータを取得中...</div>
        </div>
    </div>

    <script>
        const filePath = "./context.txt";
        
        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyAFEhguRtpgokh37YZCtHxjA8tHO4tu6Lg",
            authDomain: "tanuki-nu-vrc-profile.firebaseapp.com",
            databaseURL: "https://tanuki-nu-vrc-profile-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tanuki-nu-vrc-profile",
            storageBucket: "tanuki-nu-vrc-profile.firebasestorage.app",
            messagingSenderId: "751669057525",
            appId: "1:751669057525:web:cf65d84fdcd2a4416d32bc",
            measurementId: "G-L7JBGHCZ1E"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 来場者カウンター ---
        class VisitorCounter {
            constructor() {
                this.counterRef = database.ref('visitor_count');
                this.sessionKey = 'visitor_session';
                this.init();
            }
            async init() {
                if (!sessionStorage.getItem(this.sessionKey)) {
                    await this.incrementCounter();
                    sessionStorage.setItem(this.sessionKey, 'true');
                }
                this.displayCounter();
                this.setupScrollListener();
            }
            async incrementCounter() {
                try {
                    await this.counterRef.transaction(c => (c || 0) + 1);
                } catch (e) { console.error('Counter Error:', e); }
            }
            displayCounter() {
                const display = document.getElementById('counter-display');
                this.counterRef.on('value', snap => {
                    display.innerHTML = (snap.val() || 0).toLocaleString();
                });
            }
            setupScrollListener() {
                const visitorCounter = document.getElementById('visitor-counter');
                const navList = document.getElementById('nav-list');
                const checkOverlap = () => {
                    const navRect = navList.getBoundingClientRect();
                    const counterRect = visitorCounter.getBoundingClientRect();
                    if (counterRect.top - navRect.bottom < 20) {
                        visitorCounter.classList.add('faded');
                    } else {
                        visitorCounter.classList.remove('faded');
                    }
                };
                window.addEventListener('scroll', checkOverlap);
                window.addEventListener('resize', checkOverlap);
            }
        }

        // --- 無操作キック機能 (20分 / 0.5% 確率分岐) ---
        class InactivityKick {
            constructor(timeoutMinutes, defaultUrl, rareUrl) {
                this.timeoutMs = timeoutMinutes * 60 * 1000;
                this.defaultUrl = defaultUrl;
                this.rareUrl = rareUrl;
                this.timer = null;
                this.init();
            }
            init() {
                const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
                events.forEach(e => document.addEventListener(e, () => this.resetTimer(), true));
                this.resetTimer();
            }
            resetTimer() {
                clearTimeout(this.timer);
                this.timer = setTimeout(() => {
                    // 0.5%の確率でVRChat、それ以外はX
                    const isRare = Math.random() < 0.005; 
                    window.location.href = isRare ? this.rareUrl : this.defaultUrl;
                }, this.timeoutMs);
            }
        }

        // --- テキスト取得 & ビルド ---
        function linkifyText(text) {
            const urlPattern = /(https?:\/\/[^\s]+|ftp:\/\/[^\s]+)/g;
            const container = document.createElement('span');
            text.split(urlPattern).forEach(part => {
                if (part && (part.startsWith('http') || part.startsWith('ftp'))) {
                    const a = document.createElement('a');
                    a.href = part; a.textContent = part; a.target = '_blank'; a.rel = 'noopener noreferrer';
                    container.appendChild(a);
                } else {
                    container.appendChild(document.createTextNode(part));
                }
            });
            return container.childNodes;
        }

        async function fetchAndBuild() {
            const container = document.getElementById('text-target');
            const navList = document.getElementById('nav-list');
            try {
                const response = await fetch(filePath + `?t=${new Date().getTime()}`, { cache: "no-store" });
                if (!response.ok) throw new Error();
                const rawText = await response.text();
                container.innerHTML = ""; container.className = ""; navList.innerHTML = "";

                let sectionCount = 0;
                rawText.split(/(《[^》]+》)/g).forEach(part => {
                    if (part.startsWith('《') && part.endsWith('》')) {
                        sectionCount++;
                        const title = part.replace(/[《》]/g, '');
                        const id = `section-${sectionCount}`;
                        const h = document.createElement('span');
                        h.className = 'section-title'; h.id = id; h.textContent = title;
                        container.appendChild(h);
                        const nav = document.createElement('a');
                        nav.className = 'nav-item'; nav.textContent = title; nav.href = `#${id}`;
                        navList.appendChild(nav);
                    } else if (part.trim() !== "") {
                        const p = document.createElement('span');
                        p.className = 'section-text';
                        linkifyText(part.trim()).forEach(node => p.appendChild(node.cloneNode(true)));
                        container.appendChild(p);
                    }
                });
            } catch (err) {
                container.innerHTML = `<div style="color:red;">データの取得失敗</div>`;
            }
        }

        // --- 実行 ---
        fetchAndBuild();
        new VisitorCounter();
        new InactivityKick(
            20, 
            "https://x.com/tanukiinu_vrc", 
            "https://vrchat.com/home/user/usr_79be366a-9b5f-4b25-818f-af90d0f42c99"
        );
    </script>
</body>
</html>
