<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日次アンケート — test</title>
  <meta name="description" content="1日1回回答できるはい/いいえアンケート" />
  <style>
    :root{
      --yes: #B8E6C2; /* pastel green */
      --no:  #F7C6C3; /* pastel pink */
      --card-bg: rgba(255,255,255,0.40); /* カード透過40% */
      --muted:#666666;
      --radius:12px;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --bar-bg: rgba(0,0,0,0.06);
    }
    html,body{height:100%;margin:0}
    body{
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background-color: #f2f4f6;
      position:relative;
      overflow:hidden;
    }

    /* 背景要素 */
    #bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(6px);
      transform: scale(1.05); /* ぼかしの縁を隠すために少し拡大 */
      transition: opacity 800ms ease-in-out;
      opacity: 0;
    }
    #bgOverlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(255,255,255,0.1);
      pointer-events: none;
    }

    .card {
      width:100%;
      max-width:760px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px;
      backdrop-filter: blur(8px);
      box-sizing:border-box;
      text-align:center;
    }

    h1 { margin:0 0 8px 0; font-weight:600; font-size:1.25rem; color:#222222; }
    .question { font-size:2.2rem; font-weight:700; margin:18px 0 22px 0; color:#111111; letter-spacing:1px; }

    .controls { display:flex; gap:18px; justify-content:center; align-items:center; margin-bottom:18px; flex-wrap:wrap; }

    .btn {
      -webkit-tap-highlight-color: transparent;
      appearance:none;
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight:700;
      color: #ffffff;
      min-width:140px;
      transition: transform .08s ease, opacity .12s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity:0.6; cursor:default; transform:none; }

    .btn-yes { background: var(--yes); color:#1b3b1f; }
    .btn-no  { background: var(--no);  color:#4a1a18; }

    .counts { display:flex; gap:12px; justify-content:center; align-items:center; margin-top:8px; color:var(--muted); font-size:0.95rem; }

    .bar-wrap {
      margin-top:18px;
      width:100%;
      background:var(--bar-bg);
      border-radius:10px;
      overflow:hidden;
      height:44px;
      display:flex;
      align-items:center;
      position:relative;
    }
    .bar-yes {
      background: var(--yes);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding-left:12px;
      color:#1b3b1f;
      font-weight:700;
      transition: width 500ms cubic-bezier(0.4, 0, 0.2, 1);
      white-space:nowrap;
      box-sizing:border-box;
    }
    .bar-no {
      background: var(--no);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:12px;
      color:#4a1a18;
      font-weight:700;
      transition: width 500ms cubic-bezier(0.4, 0, 0.2, 1);
      white-space:nowrap;
      box-sizing:border-box;
    }
    .bar-label { font-size:0.95rem; }

    .status { margin-top:14px; font-size:0.95rem; color:#222222; min-height:1.2em; font-weight: 500; }
    .note { margin-top:12px; color:var(--muted); font-size:0.9rem; }
    .footer { margin-top:18px; font-size:0.82rem; color:var(--muted); }

    @media (max-width:480px){
      .question { font-size:1.6rem; }
      .btn { padding:12px 16px; min-width:110px; font-size:1rem; }
      .card { padding:18px; }
      .bar-wrap { height:40px; }
    }
  </style>
</head>
<body>
  <div id="bg" aria-hidden="true"></div>
  <div id="bgOverlay" aria-hidden="true"></div>

  <main class="card" role="main" aria-labelledby="qTitle">
    <h1 id="qTitle">test</h1>
    <div class="question">test</div>

    <div class="controls" role="group" aria-label="回答">
      <button id="btnYes" class="btn btn-yes" aria-pressed="false">はい</button>
      <button id="btnNo"  class="btn btn-no"  aria-pressed="false">いいえ</button>
    </div>

    <div class="counts" aria-live="polite">
      <div>はい: <span id="countY">0</span></div>
      <div>いいえ: <span id="countN">0</span></div>
      <div>合計: <span id="countTotal">0</span></div>
    </div>

    <div class="bar-wrap" aria-label="はい と いいえ の比率">
      <div id="barYes" class="bar-yes" style="width:50%">
        <span class="bar-label" id="barYesLabel">はい 50% (0)</span>
      </div>
      <div id="barNo" class="bar-no" style="width:50%">
        <span class="bar-label" id="barNoLabel">いいえ 50% (0)</span>
      </div>
    </div>

    <div class="status" id="status" role="status" aria-live="polite"></div>
    <div class="note">1日につき1回だけ回答できます。</div>
    <div class="footer">Made by たぬきーぬ</div>
  </main>

  <script>
    // --- 1. Firebase 設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAFEhguRtpgokh37YZCtHxjA8tHO4tu6Lg",
      authDomain: "tanuki-nu-vrc-profile.firebaseapp.com",
      databaseURL: "https://tanuki-nu-vrc-profile-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tanuki-nu-vrc-profile",
      storageBucket: "tanuki-nu-vrc-profile.firebasestorage.app",
      messagingSenderId: "751669057525",
      appId: "1:751669057525:web:cf65d84fdcd2a4416d32bc",
      measurementId: "G-L7JBGHCZ1E"
    };

    // --- 2. 画像読み込み (改善版) ---
    const bgEl = document.getElementById('bg');
    const driveFileId = '1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC';
    // export=download にすることで、より直接的な画像データ取得を試みます
    const driveUrl = `https://drive.google.com/uc?id=${driveFileId}`;

    (function initBackgroundImage() {
      const img = new Image();
      img.src = driveUrl;
      img.onload = () => {
        bgEl.style.backgroundImage = `url("${driveUrl}")`;
        bgEl.style.opacity = '1';
      };
      img.onerror = () => {
        bgEl.style.background = 'linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%)';
        bgEl.style.opacity = '1';
        console.warn('背景画像の読み込みに失敗しました。Driveの共有設定を確認してください。');
      };
    })();

    // --- 3. Firebase & アンケートロジック ---
    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');
    const countYEl = document.getElementById('countY');
    const countNEl = document.getElementById('countN');
    const countTotalEl = document.getElementById('countTotal');
    const statusEl = document.getElementById('status');
    const barYes = document.getElementById('barYes');
    const barNo = document.getElementById('barNo');
    const barYesLabel = document.getElementById('barYesLabel');
    const barNoLabel = document.getElementById('barNoLabel');

    function loadScript(src){
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function getDateKey(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    const localVoteKey = `voted_${getDateKey()}`;

    (async function initApp(){
      try {
        await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js');

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const refY = db.ref('/soft_dayvote_y');
        const refN = db.ref('/soft_dayvote_n');

        let latestY = 0;
        let latestN = 0;

        const updateUI = () => {
          const total = latestY + latestN;
          countYEl.textContent = latestY;
          countNEl.textContent = latestN;
          countTotalEl.textContent = total;

          const pY = total > 0 ? Math.round((latestY / total) * 100) : 50;
          const pN = 100 - pY;
          barYes.style.width = pY + '%';
          barNo.style.width = pN + '%';
          barYesLabel.textContent = `はい ${pY}% (${latestY})`;
          barNoLabel.textContent = `いいえ ${pN}% (${latestN})`;
        };

        refY.on('value', snap => { latestY = snap.val() || 0; updateUI(); });
        refN.on('value', snap => { latestN = snap.val() || 0; updateUI(); });

        const alreadyVoted = !!localStorage.getItem(localVoteKey);
        btnYes.disabled = alreadyVoted;
        btnNo.disabled = alreadyVoted;

        if (alreadyVoted) {
          statusEl.textContent = '本日は投票済みです。また明日お越しください！';
        } else {
          statusEl.textContent = '「はい」か「いいえ」で教えてね。';
        }

        async function vote(choice) {
          if (localStorage.getItem(localVoteKey)) return;
          
          btnYes.disabled = true;
          btnNo.disabled = true;
          statusEl.textContent = '送信中...';

          const targetRef = (choice === 'y') ? refY : refN;
          
          try {
            await targetRef.transaction(curr => (curr || 0) + 1);
            localStorage.setItem(localVoteKey, 'true');
            statusEl.textContent = '投票ありがとうございます！';
          } catch (e) {
            console.error(e);
            statusEl.textContent = 'エラーが発生しました。';
            btnYes.disabled = false;
            btnNo.disabled = false;
          }
        }

        btnYes.onclick = () => vote('y');
        btnNo.onclick = () => vote('n');

      } catch (e) {
        statusEl.textContent = '読み込みに失敗しました。';
      }
    })();
  </script>
</body>
</html>
