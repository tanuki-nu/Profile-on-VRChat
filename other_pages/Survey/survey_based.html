<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日次アンケート — test</title>
  <meta name="description" content="1日1回回答できるはい/いいえアンケート" />
  <style>
    :root{
      --yes: #B8E6C2; /* pastel green */
      --no:  #F7C6C3; /* pastel pink */
      --card-bg: rgba(255,255,255,0.40); /* カード透過40% */
      --muted:#666666;
      --radius:12px;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --bar-bg: rgba(0,0,0,0.06);
    }
    html,body{height:100%;margin:0}
    body{
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background-color: #f2f4f6; /* フォールバック色 */
      position:relative;
      overflow:hidden;
    }

    /* 背景要素（JSで画像をセットしてぼかす） */
    #bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-position: center top;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(6px);
      transform: scale(1.02);
      transition: opacity 240ms ease;
      opacity: 0;
    }
    #bgOverlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
      transition: opacity 240ms ease;
      opacity: 1;
    }

    .card {
      width:100%;
      max-width:760px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px;
      backdrop-filter: blur(4px);
      box-sizing:border-box;
      text-align:center;
    }

    h1 { margin:0 0 8px 0; font-weight:600; font-size:1.25rem; color:#222222; }
    .question { font-size:2.2rem; font-weight:700; margin:18px 0 22px 0; color:#111111; letter-spacing:1px; }

    .controls { display:flex; gap:18px; justify-content:center; align-items:center; margin-bottom:18px; flex-wrap:wrap; }

    .btn {
      -webkit-tap-highlight-color: transparent;
      appearance:none;
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight:700;
      color: #ffffff;
      min-width:140px;
      transition: transform .08s ease, opacity .12s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity:0.6; cursor:default; transform:none; }

    /* パステルボタン（文字色は読みやすく調整） */
    .btn-yes { background: var(--yes); color:#1b3b1f; }
    .btn-no  { background: var(--no);  color:#4a1a18; }

    .counts { display:flex; gap:12px; justify-content:center; align-items:center; margin-top:8px; color:var(--muted); font-size:0.95rem; }

    /* 比較バー（影なし、パステル） */
    .bar-wrap {
      margin-top:18px;
      width:100%;
      background:var(--bar-bg);
      border-radius:10px;
      overflow:hidden;
      height:44px;
      display:flex;
      align-items:center;
      position:relative;
    }
    .bar-yes {
      background: var(--yes);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding-left:12px;
      color:#1b3b1f;
      font-weight:700;
      transition: width 300ms ease;
      white-space:nowrap;
      box-sizing:border-box;
      box-shadow: none;
    }
    .bar-no {
      background: var(--no);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:12px;
      color:#4a1a18;
      font-weight:700;
      transition: width 300ms ease;
      white-space:nowrap;
      box-sizing:border-box;
      box-shadow: none;
    }
    .bar-label { font-size:0.95rem; text-shadow: none; }

    .status { margin-top:14px; font-size:0.95rem; color:#222222; min-height:1.2em; }

    .note { margin-top:12px; color:var(--muted); font-size:0.9rem; }

    .footer { margin-top:18px; font-size:0.82rem; color:var(--muted); }

    @media (max-width:480px){
      .question { font-size:1.6rem; }
      .btn { padding:12px 16px; min-width:110px; font-size:1rem; }
      .card { padding:18px; }
      .bar-wrap { height:40px; }
    }
  </style>
</head>
<body>
  <div id="bg" aria-hidden="true"></div>
  <div id="bgOverlay" aria-hidden="true"></div>

  <main class="card" role="main" aria-labelledby="qTitle">
    <h1 id="qTitle">test</h1>
    <div class="question" aria-hidden="true">test</div>

    <div class="controls" role="group" aria-label="回答">
      <button id="btnYes" class="btn btn-yes" aria-pressed="false" aria-label="はい">はい</button>
      <button id="btnNo"  class="btn btn-no"  aria-pressed="false" aria-label="いいえ">いいえ</button>
    </div>

    <div class="counts" aria-live="polite">
      <div>はい: <span id="countY">0</span></div>
      <div>いいえ: <span id="countN">0</span></div>
      <div>合計: <span id="countTotal">0</span></div>
    </div>

    <div class="bar-wrap" aria-hidden="false" aria-label="はい と いいえ の比率">
      <div id="barYes" class="bar-yes" style="width:50%">
        <span class="bar-label" id="barYesLabel">はい 50% (0)</span>
      </div>
      <div id="barNo" class="bar-no" style="width:50%">
        <span class="bar-label" id="barNoLabel">いいえ 50% (0)</span>
      </div>
    </div>

    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="note">1日につき1回だけ回答できます。</div>

    <div class="footer">Made by たぬきーぬ</div>
  </main>

  <script>
    // Firebase 設定（そのまま）
    const firebaseConfig = {
      apiKey: "AIzaSyAFEhguRtpgokh37YZCtHxjA8tHO4tu6Lg",
      authDomain: "tanuki-nu-vrc-profile.firebaseapp.com",
      databaseURL: "https://tanuki-nu-vrc-profile-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tanuki-nu-vrc-profile",
      storageBucket: "tanuki-nu-vrc-profile.firebasestorage.app",
      messagingSenderId: "751669057525",
      appId: "1:751669057525:web:cf65d84fdcd2a4416d32bc",
      measurementId: "G-L7JBGHCZ1E"
    };

    // DOM
    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');
    const countYEl = document.getElementById('countY');
    const countNEl = document.getElementById('countN');
    const countTotalEl = document.getElementById('countTotal');
    const statusEl = document.getElementById('status');
    const barYes = document.getElementById('barYes');
    const barNo = document.getElementById('barNo');
    const barYesLabel = document.getElementById('barYesLabel');
    const barNoLabel = document.getElementById('barNoLabel');

    // 背景要素
    const bgEl = document.getElementById('bg');

    // Drive の uc 形式 URL（あなたが確認済みのID）
    const driveFileId = '1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC';
    const driveUrl = `https://drive.google.com/uc?export=view&id=${driveFileId}`;

    // 画像読み込みチェックして成功時に背景に設定、失敗時はフォールバック
    (function loadBackgroundImage() {
      const img = new Image();
      img.onload = () => {
        bgEl.style.backgroundImage = `url("${driveUrl}")`;
        bgEl.style.opacity = '1';
      };
      img.onerror = () => {
        bgEl.style.backgroundImage = 'linear-gradient(180deg,#eef2f6 0%, #f8fafc 100%)';
        bgEl.style.filter = 'blur(4px)';
        bgEl.style.opacity = '1';
        console.warn('背景画像の読み込みに失敗しました。Driveの共有設定やURLを確認してください。');
      };
      img.src = driveUrl;
    })();

    // スクリプト読み込みユーティリティ
    function loadScript(src){
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Failed to load ' + src));
        document.head.appendChild(s);
      });
    }

    // 日付キー (YYYY-MM-DD) — ローカルで「今日投票済み」チェックに使用
    function getDateKey(d = new Date()){
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    const dateKey = getDateKey();
    const localVoteKey = `tanukinu_voted_${dateKey}`;

    // 初期化
    (async function init(){
      try {
        // Firebase compat ライブラリを読み込む
        await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js');

        // 初期化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 保存形式: /soft_dayvote_y と /soft_dayvote_n
        const refY = db.ref('/soft_dayvote_y');
        const refN = db.ref('/soft_dayvote_n');

        // 既に投票済みかどうか（ローカルチェック）
        const alreadyVoted = !!localStorage.getItem(localVoteKey);
        setButtonsEnabled(!alreadyVoted);

        // 最新値を保持
        let latestY = 0;
        let latestN = 0;

        // リアルタイムで値を監視
        refY.on('value', snapshot => {
          const y = snapshot.val();
          latestY = (typeof y === 'number') ? y : 0;
          updateCounts();
        });
        refN.on('value', snapshot => {
          const n = snapshot.val();
          latestN = (typeof n === 'number') ? n : 0;
          updateCounts();
        });

        // ボタンイベント
        btnYes.addEventListener('click', () => handleVote('y'));
        btnNo.addEventListener('click', () => handleVote('n'));

        function updateCounts(){
          const total = Math.max(0, latestY + latestN);
          countYEl.textContent = latestY;
          countNEl.textContent = latestN;
          countTotalEl.textContent = total;
          updateBars(latestY, latestN);
        }

        function updateBars(y, n){
          const total = Math.max(1, y + n); // 0除算防止
          const pY = Math.round((y / total) * 100);
          const pN = 100 - pY;
          barYes.style.width = pY + '%';
          barNo.style.width = pN + '%';
          barYesLabel.textContent = `はい ${pY}% (${y})`;
          barNoLabel.textContent = `いいえ ${pN}% (${n})`;
        }

        // 投票処理
        async function handleVote(choice){
          if (localStorage.getItem(localVoteKey)) {
            statusEl.textContent = '本日は既に投票済みです。';
            return;
          }

          setButtonsEnabled(false);
          statusEl.textContent = '送信中...';

          try {
            if (choice === 'y') {
              await new Promise((resolve, reject) => {
                refY.transaction(current => {
                  if (current === null || typeof current !== 'number') return 1;
                  return current + 1;
                }, (error, committed, snapshot) => {
                  if (error) reject(error);
                  else if (!committed) reject(new Error('transaction not committed'));
                  else resolve(snapshot.val());
                });
              });
            } else {
              await new Promise((resolve, reject) => {
                refN.transaction(current => {
                  if (current === null || typeof current !== 'number') return 1;
                  return current + 1;
                }, (error, committed, snapshot) => {
                  if (error) reject(error);
                  else if (!committed) reject(new Error('transaction not committed'));
                  else resolve(snapshot.val());
                });
              });
            }

            // ローカルに投票済みフラグを保存（1日限定）
            localStorage.setItem(localVoteKey, JSON.stringify({
              choice: choice,
              timestamp: new Date().toISOString()
            }));

            statusEl.textContent = (choice === 'y') ? '「はい」を受け付けました。' : '「いいえ」を受け付けました。';
            if (choice === 'y') btnYes.setAttribute('aria-pressed','true'); else btnNo.setAttribute('aria-pressed','true');
          } catch (err) {
            console.error(err);
            statusEl.textContent = '送信に失敗しました。再度お試しください。';
            setButtonsEnabled(true);
          }
        }

        function setButtonsEnabled(enabled){
          btnYes.disabled = !enabled;
          btnNo.disabled  = !enabled;
          if (!enabled) {
            btnYes.style.opacity = '0.9';
            btnNo.style.opacity = '0.9';
          } else {
            btnYes.style.opacity = '';
            btnNo.style.opacity = '';
          }
        }

        // 初期ステータス表示
        if (alreadyVoted) {
          const info = JSON.parse(localStorage.getItem(localVoteKey) || 'null');
          const sign = info && info.choice === 'y' ? 'はい' : 'いいえ';
          statusEl.textContent = `本日は既に投票済み（${sign}）。次回は ${getNextDateString()} に投票できます。`;
        } else {
          statusEl.textContent = '本日まだ投票していません。「はい」または「いいえ」を選択してください。';
        }

        function getNextDateString(){
          const d = new Date();
          d.setDate(d.getDate() + 1);
          return d.toLocaleDateString();
        }

      } catch (e) {
        console.error(e);
        statusEl.textContent = '初期化に失敗しました。ネットワークや設定を確認してください。';
        btnYes.disabled = true;
        btnNo.disabled = true;
      }
    })();
  </script>
</body>
</html>
