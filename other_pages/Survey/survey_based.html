<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>はい/いいえ アンケート（割合バー表示・背景画像）</title>
<style>
  :root{
    --yes-hex: #FF9AA2; /* はい：赤のパステル（HEX 表示用） */
    --no-hex:  #A0C4FF; /* いいえ：青のパステル（HEX 表示用） */
  }

  /* 背景画像（Google Drive 共有ファイルを直接表示する形式） */
  html,body{height:100%;}
  body{
    margin:0;
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color:#222;
    background-image: url("https://drive.google.com/uc?export=view&id=1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    padding:28px;
    box-sizing:border-box;
  }

  /* カード */
  .overlay {
    max-width:760px;
    margin:28px auto;
    background: rgba(255,255,255,0.92);
    border-radius:12px;
    padding:20px;
    box-shadow: 0 8px 30px rgba(10,10,30,0.12);
    backdrop-filter: blur(6px);
  }

  h1{margin:0 0 6px;font-size:1.25rem;}
  .muted{color:#555;font-size:0.95rem;margin-bottom:10px;}
  .question{font-size:1.05rem;margin:10px 0;}
  .byline{font-size:0.85rem;color:#777;margin-bottom:12px;}

  .buttons{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
  button{
    padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  button.yes{background:var(--yes-hex);color:#fff}
  button.no{background:var(--no-hex);color:#fff}

  .status{margin-top:12px;color:#2b6;font-min-height:20px;min-height:20px}
  .bars{margin-top:18px}
  .barRow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .label{width:92px;font-weight:800;display:flex;flex-direction:column}
  .hexText{font-weight:700;font-size:0.88rem;color:#333;margin-top:4px;letter-spacing:0.02em}
  .barWrap{flex:1;background:rgba(0,0,0,0.06);border-radius:999px;padding:4px}
  .barInner{height:34px;border-radius:999px;width:0%;transition:width 600ms ease, background-color 200ms}
  .percent{width:64px;text-align:right;font-weight:800}
  .small{font-size:0.9rem;color:#555;margin-top:10px}

  /* 色の微調整（薄いパステルの影） */
  .barInner.yes{background: linear-gradient(90deg, rgba(255,154,162,0.95), rgba(255,154,162,0.85)); box-shadow: inset 0 -2px 6px rgba(0,0,0,0.06);}
  .barInner.no{background: linear-gradient(90deg, rgba(160,196,255,0.95), rgba(160,196,255,0.85)); box-shadow: inset 0 -2px 6px rgba(0,0,0,0.06);}

  @media (max-width:520px){
    .label{width:72px}
    .percent{width:52px}
  }
</style>
</head>
<body>
  <div class="overlay" role="region" aria-label="アンケート">
    <h1>アンケート</h1>
    <p class="muted">以下の質問に「はい」か「いいえ」でお答えください。1日1回まで投票できます（ブラウザ単位）。</p>

    <div class="question" id="questionText">このサービスは役に立ちましたか？</div>
    <div class="byline">By test</div>

    <div class="buttons" aria-hidden="false">
      <button id="btnYes" class="yes" aria-label="はいで投票">はい</button>
      <button id="btnNo" class="no" aria-label="いいえで投票">いいえ</button>
    </div>

    <div id="status" class="status" aria-live="polite"></div>

    <div class="bars" aria-live="polite" aria-atomic="true">
      <div class="barRow">
        <div class="label">
          <div>はい</div>
          <div class="hexText" id="hexYesText">#FF9AA2</div>
        </div>
        <div class="barWrap" aria-hidden="true">
          <div id="barYes" class="barInner yes" style="width:0%"></div>
        </div>
        <div class="percent" id="pctYes">0%</div>
      </div>

      <div class="barRow">
        <div class="label">
          <div>いいえ</div>
          <div class="hexText" id="hexNoText">#A0C4FF</div>
        </div>
        <div class="barWrap" aria-hidden="true">
          <div id="barNo" class="barInner no" style="width:0%"></div>
        </div>
        <div class="percent" id="pctNo">0%</div>
      </div>
    </div>

    <p class="small" id="nextAllowedInfo">本日まだ投票していません。1日1回投票できます。</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    // Firebase 設定（ユーザー提供のもの）
    const firebaseConfig = {
      apiKey: "AIzaSyAFEhguRtpgokh37YZCtHxjA8tHO4tu6Lg",
      authDomain: "tanuki-nu-vrc-profile.firebaseapp.com",
      databaseURL: "https://tanuki-nu-vrc-profile-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tanuki-nu-vrc-profile",
      storageBucket: "tanuki-nu-vrc-profile.firebasestorage.app",
      messagingSenderId: "751669057525",
      appId: "1:751669057525:web:cf65d84fdcd2a4416d32bc",
      measurementId: "G-L7JBGHCZ1E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 保存先（soft_）
    const PATH_Y = 'votes/soft_dayvote_y';
    const PATH_N = 'votes/soft_dayvote_n';

    // 色（HEX 表示）
    const YES_HEX = '#FF9AA2'; // はい：赤のパステル
    const NO_HEX  = '#A0C4FF'; // いいえ：青のパステル

    // DOM
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const statusEl = document.getElementById('status');
    const barYes = document.getElementById('barYes');
    const barNo = document.getElementById('barNo');
    const pctYes = document.getElementById('pctYes');
    const pctNo = document.getElementById('pctNo');
    const hexYesText = document.getElementById('hexYesText');
    const hexNoText = document.getElementById('hexNoText');
    const nextAllowedInfo = document.getElementById('nextAllowedInfo');

    // ローカルキー（1日1回）
    const LOCAL_DATE_KEY = 'soft_voted_dayvote_date';

    // 初期色表示（CSS 変数とテキスト）
    document.documentElement.style.setProperty('--yes-hex', YES_HEX);
    document.documentElement.style.setProperty('--no-hex', NO_HEX);
    hexYesText.textContent = YES_HEX;
    hexNoText.textContent = NO_HEX;

    // 日付ユーティリティ
    function todayString(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    function nextDayString(){
      const d = new Date();
      d.setDate(d.getDate()+1);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    // 1日1回チェック
    function canVoteToday(){
      const stored = localStorage.getItem(LOCAL_DATE_KEY);
      return stored !== todayString();
    }

    // リアルタイム監視とバー更新
    function listenAndRender() {
      const refY = ref(db, PATH_Y);
      const refN = ref(db, PATH_N);

      let valY = 0, valN = 0;

      onValue(refY, snap => {
        valY = Number(snap.val() ?? 0);
        renderBars(valY, valN);
      }, err => console.error(err));

      onValue(refN, snap => {
        valN = Number(snap.val() ?? 0);
        renderBars(valY, valN);
      }, err => console.error(err));
    }

    function renderBars(y, n){
      const total = y + n;
      const pctY = total === 0 ? 0 : Math.round((y / total) * 100);
      const pctN = total === 0 ? 0 : 100 - pctY;
      // 幅を設定（最小幅を 1% にして見えやすくする）
      barYes.style.width = (total === 0 ? 0 : pctY) + '%';
      barNo.style.width = (total === 0 ? 0 : pctN) + '%';
      pctYes.textContent = pctY + '%';
      pctNo.textContent = pctN + '%';
    }

    // トランザクションで +1
    async function incrementCounter(path){
      const counterRef = ref(db, path);
      try {
        await runTransaction(counterRef, cur => (cur || 0) + 1);
        return true;
      } catch(e){
        console.error('incrementCounter error', e);
        return false;
      }
    }

    // 投票処理
    async function vote(isYes){
      if (!canVoteToday()){
        const stored = localStorage.getItem(LOCAL_DATE_KEY);
        statusEl.textContent = `本日は既に投票済みです（${stored}）。次は ${nextDayString()} に投票できます。`;
        return;
      }
      statusEl.textContent = '送信中…';
      btnYes.disabled = true;
      btnNo.disabled = true;

      const path = isYes ? PATH_Y : PATH_N;
      const ok = await incrementCounter(path);

      if (ok){
        // 任意ログ
        const metaRef = ref(db, 'votes/soft_logs/' + Date.now());
        try {
          await set(metaRef, {
            choice: isYes ? 'yes' : 'no',
            timestamp: new Date().toISOString(),
            source: 'web'
          });
        } catch(e){ console.warn('log write failed', e); }

        localStorage.setItem(LOCAL_DATE_KEY, todayString());
        statusEl.textContent = 'ご回答ありがとうございました。次は翌日以降に投票できます。';
        nextAllowedInfo.textContent = `次に投票できるのは ${nextDayString()} です。`;
      } else {
        statusEl.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
      }

      setTimeout(()=>{ btnYes.disabled = false; btnNo.disabled = false; }, 1200);
    }

    // 初期化
    (function init(){
      statusEl.textContent = '';
      listenAndRender();

      btnYes.addEventListener('click', ()=> vote(true));
      btnNo.addEventListener('click', ()=> vote(false));

      // 初期値が無ければ 0 をセット（上書きしない）
      const initRefY = ref(db, PATH_Y);
      const initRefN = ref(db, PATH_N);
      runTransaction(initRefY, cur => (cur === null ? 0 : cur)).catch(()=>{});
      runTransaction(initRefN, cur => (cur === null ? 0 : cur)).catch(()=>{});

      // 初期表示
      if (!canVoteToday()){
        const stored = localStorage.getItem(LOCAL_DATE_KEY);
        statusEl.textContent = `本日は既に投票済みです（${stored}）。`;
        nextAllowedInfo.textContent = `次に投票できるのは ${nextDayString()} です。`;
      } else {
        nextAllowedInfo.textContent = `本日まだ投票していません。1日1回投票できます。`;
      }
    })();
  </script>
</body>
</html>
