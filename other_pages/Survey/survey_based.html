<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日次アンケート — test</title>
  <meta name="description" content="1日1回回答できるはい/いいえアンケート" />
  <style>
    :root{
      --yes: #B8E6C2;
      --no:  #F7C6C3;
      --card-bg: rgba(255,255,255,0.40); /* 元の40%透過 */
      --muted:#666666;
      --radius:12px;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --bar-bg: rgba(0,0,0,0.06);
    }
    html,body{height:100%;margin:0}
    body{
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background-color: #f2f4f6;
      position:relative;
      overflow:hidden;
    }

    #bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-position: center top;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(6px);
      transform: scale(1.02);
      /* フェードインなし：最初から表示 */
      opacity: 1; 
    }
    #bgOverlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .card {
      width:100%;
      max-width:760px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px;
      backdrop-filter: blur(4px); /* 元の4px */
      box-sizing:border-box;
      text-align:center;
    }

    h1 { margin:0 0 8px 0; font-weight:600; font-size:1.25rem; color:#222222; }
    .question { font-size:2.2rem; font-weight:700; margin:18px 0 22px 0; color:#111111; letter-spacing:1px; }

    .controls { display:flex; gap:18px; justify-content:center; align-items:center; margin-bottom:18px; flex-wrap:wrap; }

    .btn {
      -webkit-tap-highlight-color: transparent;
      appearance:none;
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight:700;
      color: #ffffff;
      min-width:140px;
      transition: transform .08s ease, opacity .12s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity:0.6; cursor:default; }

    .btn-yes { background: var(--yes); color:#1b3b1f; }
    .btn-no  { background: var(--no);  color:#4a1a18; }

    .counts { display:flex; gap:12px; justify-content:center; align-items:center; margin-top:8px; color:var(--muted); font-size:0.95rem; }

    .bar-wrap {
      margin-top:18px;
      width:100%;
      background:var(--bar-bg);
      border-radius:10px;
      overflow:hidden;
      height:44px;
      display:flex;
      position:relative;
    }
    .bar-yes {
      background: var(--yes);
      height:100%;
      display:flex;
      align-items:center;
      padding-left:12px;
      color:#1b3b1f;
      font-weight:700;
      transition: width 300ms ease;
      box-sizing:border-box;
    }
    .bar-no {
      background: var(--no);
      height:100%;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:12px;
      color:#4a1a18;
      font-weight:700;
      transition: width 300ms ease;
      box-sizing:border-box;
    }

    .status { margin-top:14px; font-size:0.95rem; color:#222222; min-height:1.2em; }
    .note { margin-top:12px; color:var(--muted); font-size:0.9rem; }
    .footer { margin-top:18px; font-size:0.82rem; color:var(--muted); }

    @media (max-width:480px){
      .question { font-size:1.6rem; }
      .btn { padding:12px 16px; min-width:110px; }
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="bgOverlay"></div>

  <main class="card">
    <h1 id="qTitle">test</h1>
    <div class="question">test</div>

    <div class="controls">
      <button id="btnYes" class="btn btn-yes">はい</button>
      <button id="btnNo"  class="btn btn-no">いいえ</button>
    </div>

    <div class="counts">
      <div>はい: <span id="countY">0</span></div>
      <div>いいえ: <span id="countN">0</span></div>
      <div>合計: <span id="countTotal">0</span></div>
    </div>

    <div class="bar-wrap">
      <div id="barYes" class="bar-yes" style="width:50%"><span id="barYesLabel">50%</span></div>
      <div id="barNo" class="bar-no" style="width:50%"><span id="barNoLabel">50%</span></div>
    </div>

    <div id="status" class="status"></div>
    <div class="note">1日につき1回だけ回答できます。</div>
    <div class="footer">Made by たぬきーぬ</div>
  </main>

  <script>
    // --- 背景画像設定 ---
    const rawUrl = 'https://drive.google.com/file/d/1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC/view?usp=sharing';
    const fileId = rawUrl.match(/\/d\/([^/]+)/)[1];
    const directUrl = `https://drive.google.com/uc?id=${fileId}`;
    document.getElementById('bg').style.backgroundImage = `url("${directUrl}")`;

    // --- Firebase 設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAFEhguRtpgokh37YZCtHxjA8tHO4tu6Lg",
      authDomain: "tanuki-nu-vrc-profile.firebaseapp.com",
      databaseURL: "https://tanuki-nu-vrc-profile-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tanuki-nu-vrc-profile",
      storageBucket: "tanuki-nu-vrc-profile.firebasestorage.app",
      messagingSenderId: "751669057525",
      appId: "1:751669057525:web:cf65d84fdcd2a4416d32bc",
      measurementId: "G-L7JBGHCZ1E"
    };

    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');
    const statusEl = document.getElementById('status');

    function loadScript(src){
      return new Promise(resolve => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        document.head.appendChild(s);
      });
    }

    const dateKey = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
    const localVoteKey = `voted_${dateKey}`;

    (async function init(){
      await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js');

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const refY = db.ref('/soft_dayvote_y');
      const refN = db.ref('/soft_dayvote_n');

      function updateDisplay(snapY, snapN) {
        const y = snapY || 0;
        const n = snapN || 0;
        const total = y + n;
        document.getElementById('countY').textContent = y;
        document.getElementById('countN').textContent = n;
        document.getElementById('countTotal').textContent = total;

        const pY = total > 0 ? Math.round((y / total) * 100) : 50;
        const pN = 100 - pY;
        document.getElementById('barYes').style.width = pY + '%';
        document.getElementById('barNo').style.width = pN + '%';
        document.getElementById('barYesLabel').textContent = `はい ${pY}%`;
        document.getElementById('barNoLabel').textContent = `いいえ ${pN}%`;
      }

      let valY = 0, valN = 0;
      refY.on('value', s => { valY = s.val(); updateDisplay(valY, valN); });
      refN.on('value', s => { valN = s.val(); updateDisplay(valY, valN); });

      const alreadyVoted = localStorage.getItem(localVoteKey);
      if (alreadyVoted) {
        btnYes.disabled = btnNo.disabled = true;
        statusEl.textContent = '本日は投票済みです。';
      }

      async function handleVote(type) {
        if (localStorage.getItem(localVoteKey)) return;
        btnYes.disabled = btnNo.disabled = true;
        const ref = type === 'y' ? refY : refN;
        await ref.transaction(c => (c || 0) + 1);
        localStorage.setItem(localVoteKey, 'true');
        statusEl.textContent = '投票を受け付けました。';
      }

      btnYes.onclick = () => handleVote('y');
      btnNo.onclick = () => handleVote('n');
    })();
  </script>
</body>
</html>
