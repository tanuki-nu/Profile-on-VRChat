<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://lh3.googleusercontent.com/d/1ElCezkQiFcDir7lQafNvh38l8eKpC7Mg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 200px;
        }

        .container {
            width: 75vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .main-box {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
            text-align: center;
        }

        .product-box {
            width: 87.5%;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            /* margin-bottomを margin: 0 auto 15px; に変更して中央寄せ */
            margin: 0 auto 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .product-box:hover {
            transform: scale(1.02);
        }

        .product-box.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-description {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-box">
            <div class="title">test</div>
            <div class="subtitle">test</div>
            <div id="products"></div>
        </div>
    </div>

    <script>
        async function fetchPageTitle(url) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const title = doc.querySelector('title')?.textContent || url;
                return title;
            } catch (error) {
                console.error('タイトルの取得に失敗:', error);
                return url;
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('wishlist_context.txt');
                const text = await response.text();
                const lines = text.trim().split('\n').filter(line => line.trim());

                const productsContainer = document.getElementById('products');
                productsContainer.innerHTML = '';

                // 3行ずつ処理
                for (let i = 0; i < lines.length; i += 3) {
                    const nameLine = lines[i]?.trim() || '';
                    const linkLine = lines[i + 1]?.trim() || '';
                    const descLine = lines[i + 2]?.trim() || '';

                    let productName = nameLine.replace(/\//g, '');
                    let productLink = linkLine.replace(/\^/g, '');
                    
                    // '*' を取り除いたベースの説明文を作成
                    let rawDesc = descLine.replace(/\*/g, '');

                    // ''で囲まれた値を正規表現で抽出 (例: 'have' -> have)
                    let match = rawDesc.match(/'([^']+)'/);
                    let innerValue = match ? match[1] : '';
                    let isDisabled = innerValue === 'have';

                    // 実際の表示用説明文からは '' の部分を削除して前後の空白を取り除く
                    let productDesc = rawDesc.replace(/'[^']+'/, '').trim();

                    if (productName && productLink && (productDesc || isDisabled)) {
                        // /default/ の場合、リンク先のページのタイトルを表示名に使用
                        if (productName === 'default' || productName === '/default/') {
                            productName = await fetchPageTitle(productLink);
                        }

                        const productBox = document.createElement('div');
                        productBox.className = 'product-box';
                        
                        // 'have'の場合はdisabledクラスを追加
                        if (isDisabled) {
                            productBox.classList.add('disabled');
                        }

                        productBox.innerHTML = `
                            <div class="product-name">${productName}</div>
                            <div class="product-description">${productDesc}</div>
                        `;

                        // クリック時に移動（disabledの場合は実行されない）
                        if (!isDisabled) {
                            productBox.onclick = () => window.location.href = productLink;
                        }

                        productsContainer.appendChild(productBox);
                    }
                }
            } catch (error) {
                console.error('ファイルの読み込みに失敗しました:', error);
                document.getElementById('products').innerHTML = '<p>データの読み込みに失敗しました</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
