<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>иғҢжҷҜгғҡгғјгӮё</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #5a5a5a;
      padding-top: 60px;
      background: url('https://lh3.googleusercontent.com/d/1jYQ8VGZfxMiAujakcluvgSk-JdXr60Rr') center/cover fixed;
      background-attachment: fixed;
      min-height: 100vh;
    }

    .overlay {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(2px);
    }

    .box {
      background: rgba(255, 255, 255, 0.7);
      padding: 24px 32px;
      border-radius: 16px;
      max-width: 720px;
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="box">
      <h1>иғҢжҷҜгғҡгғјгӮё</h1>
      <p>Google Drive гҒ®з”»еғҸгӮ’иғҢжҷҜгҒ«гҒ—гҒҰгҒ„гҒҫгҒҷгҖӮ</p>
    </div>
  </div>
</body>
</html>
