<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://lh3.googleusercontent.com/d/1ElCezkQiFcDir7lQafNvh38l8eKpC7Mg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 200px;
        }

        .container {
            width: 75vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .main-box {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .product-box {
            width: 87.5%;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-box:hover {
            transform: scale(1.02);
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-description {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-box">
            <div class="title">test</div>
            <div id="products"></div>
        </div>
    </div>

    <script>
        function getPageName(url) {
            return url.replace(/\//g, '').trim();
        }

        async function loadProducts() {
            try {
                const response = await fetch('wishlist_context.txt');
                const text = await response.text();
                const lines = text.trim().split('\n').filter(line => line.trim());

                const productsContainer = document.getElementById('products');
                productsContainer.innerHTML = '';

                lines.forEach(line => {
                    // //...//の部分を取得（名前）
                    const nameMatch = line.match(/\/\/(.+?)\/\//);
                    // ^^...^^の部分を取得（リンク先）
                    const linkMatch = line.match(/\^\^(.+?)\^\^/);
                    // **...**の部分を取得（説明）
                    const descMatch = line.match(/\*\*(.+?)\*\*/);

                    if (nameMatch && linkMatch && descMatch) {
                        let productName = nameMatch[1];
                        const productLink = linkMatch[1];
                        const productDesc = descMatch[1];

                        // /default/ の場合、リンク先のページ名を表示名に使用
                        if (productName === '/default/') {
                            productName = getPageName(productLink);
                        }

                        const productBox = document.createElement('div');
                        productBox.className = 'product-box';
                        productBox.innerHTML = `
                            <div class="product-name">${productName}</div>
                            <div class="product-description">${productDesc}</div>
                        `;

                        // クリック時に移動
                        if (productLink !== '/default/') {
                            productBox.onclick = () => window.location.href = productLink;
                        }

                        productsContainer.appendChild(productBox);
                    }
                });
            } catch (error) {
                console.error('ファイルの読み込みに失敗しました:', error);
                document.getElementById('products').innerHTML = '<p>データの読み込みに失敗しました</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
