<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Overlay Box with Text</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('https://lh3.googleusercontent.com/d/1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC');
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      background-color: #000;
      filter: blur(2px);
      transform: scale(1.02);
      z-index: -1;
    }

    .center-box {
      width: 60%;
      height: 450px;
      background-color: rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      backdrop-filter: blur(5px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 30px; /* 位置をさらに上に微調整 */
    }

    .test-text {
      font-size: 3rem;
      font-weight: bold;
      color: rgba(0, 0, 0, 0.8);
      font-family: sans-serif;
    }

    .sub-text {
      font-size: 1rem; /* 小さめ */
      color: rgba(0, 0, 0, 0.6);
      font-family: sans-serif;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="center-box">
    <div class="test-text">test</div>
    <div class="sub-text">by test</div>
  </div>
</body>
</html>
