<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景画像ページ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Googleドライブの直リンク用URLに変換済み */
            background: url('https://drive.google.com/uc?export=view&id=1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC') center/cover no-repeat fixed;
            
            /* フォントとテキストの配置設定 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .content {
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* 背景を少し暗くして文字を読みやすく */
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Background Image Loaded</h1>
        <p>Googleドライブの画像を背景に設定しました。</p>
    </div>
</body>
</html>
