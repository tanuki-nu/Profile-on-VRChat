<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Background Image</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .bg-image {
      width: 100vw;
      height: 100vh;
      /* Google DriveのIDを埋め込んだURL */
      background-image: url('https://lh3.googleusercontent.com/d/1lbsLiptem9usVOmEbVOBHXb9tAX1MuFC');
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      background-color: #000;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
</body>
</html>
