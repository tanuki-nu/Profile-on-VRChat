<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>適当なサンプルページ</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            background: #fff;
            padding: 2rem;
            margin-top: 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>私のWebサイト</h1>
    </header>

    <main>
        <h2>こんにちは！</h2>
        <p>これはHTMLの基本的なテンプレートです。ここに文章を書いていきます。</p>
        
        <ul>
            <li>箇条書きその1</li>
            <li>箇条書きその2</li>
            <li>箇条書きその3</li>
        </ul>

        <button type="button" onclick="alert('クリックされました！')">
            ボタンのテスト
        </button>
    </main>

</body>
</html>
